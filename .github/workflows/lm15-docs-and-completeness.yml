name: LM15 Docs and Completeness

on:
  push:
    paths:
      - 'lm15/**'
      - 'tests/**'
      - 'docs/**'
      - 'examples/**'
      - 'completeness/**'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/lm15-docs-and-completeness.yml'
  pull_request:
    paths:
      - 'lm15/**'
      - 'tests/**'
      - 'docs/**'
      - 'examples/**'
      - 'completeness/**'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/lm15-docs-and-completeness.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Validate docs/examples
        run: python examples/validate_examples.py

      - name: Completeness fixture gate
        run: python completeness/runner.py --mode fixture --fail-under 1.0
